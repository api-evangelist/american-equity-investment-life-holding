aid: american-equity-investment-life-holding
url: https://raw.githubusercontent.com/api-evangelist/american-equity-investment-life-holding/refs/heads/main/apis.yml
name: American Equity Investment Life Holding
description: >-
  American Equity Investment Life Holding Company is a leading provider of guaranteed
  income solutions, specializing in the design, development, and sale of fixed indexed
  and fixed-rate annuity products distributed through independent agents and broker-dealers.
  The company offers products including IncomeShield, AssetShield, EstateShield, and
  GuaranteeShield annuities, providing retirees with lifetime income, principal protection,
  tax-deferred growth, and legacy planning options.
tags:
  - Financial Services
  - Insurance
  - Annuities
  - Fixed Indexed Annuity
  - Retirement
  - Life Insurance
type: Index
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
access: 3rd-Party
apis: []
common:
  - type: Website
    url: https://www.american-equity.com
  - type: Portal
    url: https://register.american-equity.com
    name: Customer MyPortal
  - type: Features
    data:
      - name: Fixed Indexed Annuities
        description: >-
          Fixed Index Annuities (FIAs) such as IncomeShield, AssetShield, and EstateShield
          that provide index-linked growth potential with protection from market downside,
          tax-deferred growth, and guaranteed lifetime income options.
      - name: Fixed Annuities
        description: >-
          GuaranteeShield fixed annuity products offering guaranteed interest rates,
          principal protection, tax-deferred growth, and flexible withdrawal options
          for conservative retirement savers.
      - name: Immediate Annuities
        description: >-
          Immediate annuity contracts converting lump sums into guaranteed income payments
          starting within 12 months, available for lifetime or fixed periods of 5 to 25 years.
      - name: Lifetime Income Guarantee
        description: >-
          Guaranteed lifetime income riders and payout options ensuring customers cannot
          outlive their retirement savings regardless of market performance.
      - name: Index Crediting Strategies
        description: >-
          Multiple index crediting options including S&P 500, BlackRock Adaptive U.S. Equity,
          BNPP Patriot Technology Index, Nasdaq Premier, and NYSE Premier indices.
      - name: Independent Agent Distribution
        description: >-
          Annuity products distributed exclusively through a network of independent insurance
          agents and broker-dealers, providing broad access for retirement planning clients.
  - type: UseCases
    data:
      - name: Retirement Income Planning
        description: >-
          Creating guaranteed lifetime income streams for retirees concerned about
          outliving their savings, providing predictable monthly income regardless
          of market conditions.
      - name: Principal Protection
        description: >-
          Protecting retirement assets from market losses while still participating
          in index-linked growth during favorable market conditions.
      - name: Tax-Deferred Growth
        description: >-
          Accumulating retirement savings on a tax-deferred basis, allowing compound
          growth without annual tax liability until withdrawals begin.
      - name: Legacy and Estate Planning
        description: >-
          Using EstateShield annuities to combine retirement income security with
          legacy planning to pass assets to heirs.
      - name: Conservative Retirement Savings
        description: >-
          Providing a low-risk alternative to market investments for pre-retirees
          seeking guaranteed growth through fixed annuity products.
  - type: Integrations
    data:
      - name: Independent Broker-Dealer Networks
        description: >-
          Integration with national and regional broker-dealer networks to distribute
          annuity products through registered investment advisors and insurance agents.
      - name: Financial Planning Platforms
        description: >-
          Compatibility with financial planning software used by independent agents to
          illustrate and recommend annuity products to clients.
